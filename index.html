<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RD Requinte Buffet & Decorações</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Jost:wght@300;400;500;600&family=Alex+Brush&display=swap" rel="stylesheet">
<style>
/* ============ CONFIG ============ */
:root{
  --espresso:#2c2419;
  --espresso-soft:#3d3323;
  --cream:#f7f2e7;
  --cream-deep:#efe6d2;
  --sage:#6f7d55;
  --sage-deep:#4f5c3c;
  --gold:#b3893f;
  --gold-light:#d7b877;
  --whatsapp:#3fae4c;
  --max-w:1180px;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--cream);
  color:var(--espresso);
  font-family:'Jost',sans-serif;
  font-weight:300;
  overflow-x:hidden;
}
h1,h2,h3,.display{
  font-family:'Fraunces',serif;
  font-weight:500;
  letter-spacing:0.01em;
}
a{text-decoration:none;color:inherit;}
img,svg{display:block;max-width:100%;}
.wrap{max-width:var(--max-w);margin:0 auto;padding:0 32px;}

@media(max-width:640px){.wrap{padding:0 20px;}}

/* ============ TOP BAR ============ */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:50;
  background:rgba(44,36,25,0.94);
  backdrop-filter:blur(6px);
  color:var(--cream);
}
.topbar .wrap{
  display:flex;align-items:center;justify-content:space-between;
  height:64px;
}
.topbar .brand{
  display:flex;align-items:center;gap:10px;
}
.topbar .brand img{
  height:44px;width:auto;
  border-radius:3px;
  background:var(--cream);
  padding:3px 8px;
}
.topbar .brand .wordmark{
  font-family:'Fraunces',serif;font-size:0.82rem;letter-spacing:0.14em;
  text-transform:uppercase;color:rgba(247,242,231,0.7);
  display:none;
}
@media(min-width:520px){.topbar .brand .wordmark{display:block;}}
.topbar .phone{
  display:flex;align-items:center;gap:8px;
  font-family:'Jost',sans-serif;font-size:0.92rem;letter-spacing:0.03em;
  border:1px solid rgba(247,242,231,0.35);
  padding:8px 16px;border-radius:100px;
  transition:border-color .25s, background .25s;
}
.topbar .phone:hover{border-color:var(--gold-light);background:rgba(255,255,255,0.05);}
.topbar .phone svg{width:15px;height:15px;fill:var(--whatsapp);}

/* ============ HERO ============ */
.hero{
  position:relative;
  min-height:100svh;
  display:flex;flex-direction:column;justify-content:center;
  padding-top:64px;
  background:
    radial-gradient(ellipse at 15% 20%, rgba(111,125,85,0.16), transparent 55%),
    radial-gradient(ellipse at 85% 80%, rgba(179,137,63,0.14), transparent 55%),
    var(--cream);
  overflow:hidden;
}
.leaf-branch{
  position:absolute;
  pointer-events:none;
  opacity:0.9;
}
.leaf-branch.tl{top:-40px;left:-60px;width:340px;transform:rotate(8deg);}
.leaf-branch.br{bottom:-60px;right:-80px;width:420px;transform:rotate(-172deg) scaleX(-1);opacity:0.55;}

.hero-inner{
  position:relative;z-index:2;
  display:grid;
  grid-template-columns:1.1fr 0.9fr;
  gap:40px;
  align-items:center;
  padding:80px 0 60px;
}
@media(max-width:900px){
  .hero-inner{grid-template-columns:1fr;padding:40px 0 50px;}
}

.eyebrow{
  font-family:'Jost',sans-serif;
  font-size:0.78rem;
  letter-spacing:0.32em;
  text-transform:uppercase;
  color:var(--sage-deep);
  margin-bottom:22px;
  display:flex;align-items:center;gap:14px;
}
.eyebrow::before{
  content:'';display:block;width:34px;height:1px;background:var(--gold);
}

.hero h1{
  font-size:clamp(2.6rem,6vw,4.6rem);
  line-height:0.98;
  color:var(--espresso);
}
.hero h1 .script{
  font-style:italic;font-weight:400;color:var(--gold);
  display:block;font-size:0.55em;margin-top:6px;
}

.hero-sub{
  margin-top:26px;
  font-size:1.08rem;
  line-height:1.75;
  max-width:46ch;
  color:var(--espresso-soft);
}

.hero-ctas{
  margin-top:38px;
  display:flex;gap:16px;flex-wrap:wrap;
}
.btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:15px 30px;
  font-family:'Jost',sans-serif;font-size:0.92rem;letter-spacing:0.05em;
  border-radius:2px;
  transition:transform .25s, box-shadow .25s, background .25s;
}
.btn-primary{
  background:var(--whatsapp);color:#fff;
  box-shadow:0 8px 22px -8px rgba(63,174,76,0.55);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 26px -8px rgba(63,174,76,0.6);}
.btn-primary svg{width:17px;height:17px;fill:#fff;}
.btn-ghost{
  border:1px solid var(--espresso);
  color:var(--espresso);
}
.btn-ghost:hover{background:var(--espresso);color:var(--cream);}

/* Logo panel — the real RD Requinte Buffet artwork, background removed,
   floating directly on the page for a clean, authentic brand mark */
.monogram-panel{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  padding:20px 0;
}
.logo-frame{
  position:relative;
  width:100%;
  max-width:420px;
}
.logo-frame img{
  width:100%;height:auto;display:block;
  filter:drop-shadow(0 18px 30px rgba(44,36,25,0.18));
}

/* ============ SECTION HEADERS ============ */
.section{padding:100px 0;}
.section-head{
  max-width:620px;
  margin:0 auto 56px;
  text-align:center;
}
.section-head .eyebrow{justify-content:center;}
.section-head .eyebrow::before{display:none;}
.section-head h2{
  font-size:clamp(2rem,4vw,2.9rem);
  color:var(--espresso);
}
.section-head p{
  margin-top:16px;color:var(--espresso-soft);line-height:1.7;font-size:1.02rem;
}

/* ============ MENU / ACTIVITIES ============ */
.menu-section{
  background:var(--espresso);
  color:var(--cream);
  position:relative;
}
.menu-section .eyebrow{color:var(--gold-light);}
.menu-section .section-head h2{color:var(--cream);}
.menu-section .section-head p{color:rgba(247,242,231,0.7);}

.menu-list{
  max-width:760px;margin:0 auto;
}
.menu-item{
  display:flex;align-items:baseline;gap:14px;
  padding:26px 4px;
  border-bottom:1px solid rgba(247,242,231,0.14);
}
.menu-item:first-child{border-top:1px solid rgba(247,242,231,0.14);}
.menu-item .num{
  font-family:'Fraunces',serif;font-style:italic;color:var(--gold-light);
  font-size:1.1rem;width:28px;flex-shrink:0;
}
.menu-item .name{
  font-family:'Fraunces',serif;font-size:1.5rem;font-weight:500;
  white-space:nowrap;
}
.menu-item .leader{
  flex:1;border-bottom:1px dotted rgba(247,242,231,0.3);
  transform:translateY(-8px);
}
.menu-item .desc{
  font-size:0.88rem;color:rgba(247,242,231,0.6);
  white-space:nowrap;
  letter-spacing:0.02em;
}
@media(max-width:640px){
  .menu-item{flex-wrap:wrap;}
  .menu-item .name{font-size:1.25rem;}
  .menu-item .leader{display:none;}
  .menu-item .desc{white-space:normal;width:100%;padding-left:42px;margin-top:2px;}
}

.menu-full{
  max-width:760px;margin:56px auto 0;
  text-align:center;
  padding:34px 30px;
  border:1px solid rgba(215,184,119,0.4);
  position:relative;
}
.menu-full .display{
  font-size:1.5rem;font-style:italic;font-weight:400;color:var(--gold-light);
  line-height:1.5;
}

/* ============ ABOUT / CHEF ============ */
.about{
  padding:100px 0;
}
.about-inner{
  display:grid;grid-template-columns:0.85fr 1.15fr;gap:70px;align-items:center;
}
@media(max-width:860px){.about-inner{grid-template-columns:1fr;gap:40px;}}

.chef-frame{
  position:relative;
  background:var(--cream-deep);
  border:1px solid rgba(44,36,25,0.1);
  aspect-ratio:3/4;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;
}
.chef-frame .initials{
  width:88px;height:88px;border-radius:50%;
  background:var(--sage);color:var(--cream);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-size:1.9rem;
  margin-bottom:22px;
}
.chef-frame h3{
  font-size:1.7rem;color:var(--espresso);
}
.chef-frame .role{
  margin-top:6px;font-size:0.78rem;letter-spacing:0.24em;text-transform:uppercase;color:var(--gold);
}

.about-text .eyebrow::before{background:var(--gold);}
.about-text h2{
  font-size:clamp(1.9rem,3.6vw,2.6rem);color:var(--espresso);margin-bottom:20px;
}
.about-text p{
  color:var(--espresso-soft);line-height:1.85;font-size:1.02rem;margin-bottom:18px;
}
.about-stats{
  display:flex;gap:44px;margin-top:34px;flex-wrap:wrap;
}
.about-stats div strong{
  display:block;font-family:'Fraunces',serif;font-size:2.1rem;color:var(--gold);
}
.about-stats div span{
  font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--espresso-soft);
}

/* ============ FEATURED BANNER (real event photo) ============ */
.featured-banner{
  position:relative;
  height:min(62vh,520px);
  overflow:hidden;
}
.featured-banner img{
  width:100%;height:100%;object-fit:cover;
  display:block;
}
.featured-banner::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(0deg, rgba(44,36,25,0.82) 0%, rgba(44,36,25,0.15) 55%, transparent 100%);
}
.featured-caption{
  position:absolute;left:0;right:0;bottom:0;z-index:2;
  padding:48px 0 40px;
  color:var(--cream);
}
.featured-caption .eyebrow{color:var(--gold-light);}
.featured-caption .eyebrow::before{background:var(--gold-light);}
.featured-caption h2{
  font-size:clamp(1.7rem,3.6vw,2.5rem);
  max-width:640px;
}

/* ============ GALLERY (real event photos) ============ */
.gallery{
  display:grid;grid-template-columns:repeat(3,1fr);gap:18px;
}
.gallery figure{
  position:relative;
  margin:0;
  aspect-ratio:1/1;
  overflow:hidden;
}
.gallery img{
  width:100%;height:100%;object-fit:cover;
  display:block;
  transition:transform .5s ease;
}
.gallery figure:hover img{transform:scale(1.05);}
.gallery figcaption{
  position:absolute;left:0;right:0;bottom:0;
  padding:16px 18px;
  font-family:'Fraunces',serif;font-style:italic;font-size:1rem;
  color:var(--cream);
  background:linear-gradient(0deg, rgba(44,36,25,0.75), transparent);
}
@media(max-width:720px){
  .gallery{grid-template-columns:1fr;}
}

/* ============ SERVICE CARDS (real photo per activity) ============ */
.service-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}
.service-card{
  position:relative;
  display:block;
  aspect-ratio:4/5;
  overflow:hidden;
  text-decoration:none;
  box-shadow:0 20px 40px -18px rgba(0,0,0,0.5);
  transition:transform .35s ease;
}
.service-card img{
  position:absolute;inset:0;
  width:100%;height:100%;object-fit:cover;
  display:block;
}
.service-card:hover{transform:translateY(-6px);}
.service-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(0deg, rgba(20,15,10,0.92) 0%, rgba(20,15,10,0.25) 55%, rgba(20,15,10,0.05) 100%);
}
.service-overlay{
  position:absolute;left:0;right:0;bottom:0;z-index:2;
  padding:22px 20px;
  color:var(--cream);
}
.service-num{
  display:block;
  font-family:'Fraunces',serif;font-style:italic;
  color:var(--gold-light);
  font-size:0.95rem;
  margin-bottom:4px;
}
.service-overlay h3{
  font-family:'Fraunces',serif;font-size:1.4rem;font-weight:500;
  color:var(--cream);
  margin-bottom:2px;
}
.service-overlay p{
  font-size:0.82rem;
  color:rgba(247,242,231,0.75);
}
@media(max-width:820px){
  .service-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:520px){
  .service-grid{grid-template-columns:1fr;}
  .service-card{aspect-ratio:16/10;}
}

/* ============ CONTACT / CTA ============ */
.contact{
  background:var(--cream-deep);
  padding:110px 0;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.contact .eyebrow{justify-content:center;}
.contact .eyebrow::before{display:none;}
.contact h2{
  font-size:clamp(2.1rem,5vw,3.2rem);color:var(--espresso);
  max-width:720px;margin:0 auto;line-height:1.15;
}
.contact h2 .script{font-style:italic;color:var(--gold);font-weight:400;}
.contact p{margin-top:20px;color:var(--espresso-soft);font-size:1.05rem;}

.phone-display{
  margin:44px auto 0;
  display:inline-flex;align-items:center;gap:16px;
  background:var(--espresso);color:var(--cream);
  padding:22px 38px;
  border-radius:3px;
}
.phone-display svg{width:26px;height:26px;fill:var(--whatsapp);flex-shrink:0;}
.phone-display .num{
  font-family:'Fraunces',serif;font-size:1.7rem;letter-spacing:0.02em;
}
.phone-display .label{
  font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-light);
  display:block;margin-bottom:2px;
}

.contact-ctas{
  margin-top:30px;display:flex;justify-content:center;gap:16px;flex-wrap:wrap;
}

/* ============ FOOTER ============ */
footer{
  background:var(--espresso);color:rgba(247,242,231,0.65);
  padding:42px 0;
}
footer .wrap{
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;
  font-size:0.85rem;
}
footer .fbrand{
  display:flex;align-items:center;gap:10px;
}
footer .fbrand img{
  height:36px;width:auto;border-radius:3px;background:var(--cream);padding:2px 6px;
}

/* ============ STICKY WHATSAPP ============ */
.float-wa{
  position:fixed;bottom:24px;right:24px;z-index:60;
  width:58px;height:58px;border-radius:50%;
  background:var(--whatsapp);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 26px -6px rgba(63,174,76,0.6);
  transition:transform .25s;
}
.float-wa:hover{transform:scale(1.08);}
.float-wa svg{width:28px;height:28px;fill:#fff;}

@media (prefers-reduced-motion: reduce){
  html{scroll-behavior:auto;}
  *{transition:none !important;}
}




</style>
</head>
